name: CI Pipeline
on:
    push:
jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 22
                cache: npm
                cache-dependency-path: app/package-lock.json

            - run: npm install
              working-directory: app

            - run: node index.js
              working-directory: app
        
    build:
        needs: test

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 22
                cache: npm
                cache-dependency-path: app/package-lock.json

            - run: npm install
              working-directory: app

            - run: mkdir build

            - run: echo "Build Successful" > build/result.txt

            - uses: actions/upload-artifact@v4
              with:
                name: build-output
                path: build/
