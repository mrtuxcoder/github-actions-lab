name: Pipeline
on:
    workflow_dispatch:
jobs:
    check-code:
       runs-on: ubuntu-latest

       steps:
         - run: echo "checking code.."

    run-tests:
        needs: check-code
        runs-on: ubuntu-latest

        steps:
            - run: echo "running test.."

    build-app:
        needs: run-tests
        runs-on: ubuntu-latest

        steps:
            - run: echo "building app at $(date).."